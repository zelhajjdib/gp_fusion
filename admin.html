<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration | GP Motors</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }

    /* ── LOGIN ── */
    #login-section {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      background: #0d0d0d; border: 1px solid rgba(255,255,255,0.08);
      padding: 48px 40px; width: 100%; max-width: 400px;
    }
    .login-box img { height: 36px; margin-bottom: 32px; }
    .login-box h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
    .login-box p  { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 32px; }
    .login-box input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 13px 16px; font-size: 0.95rem; margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #e60000; }
    .login-box button {
      width: 100%; background: #e60000; color: #fff; border: none;
      padding: 14px; font-weight: 700; font-size: 0.85rem;
      text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; margin-top: 8px;
    }
    .login-box button:hover { opacity: 0.85; }
    #login-error { color: #e60000; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

    /* ── DASHBOARD ── */
    #dashboard-section { display: none; }
    .admin-header {
      background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header img { height: 32px; mix-blend-mode: screen; }
    .admin-header span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.35); flex: 1; }
    #logout-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5);
      padding: 7px 16px; font-size: 0.8rem; cursor: pointer; letter-spacing: 0.05em;
    }
    #logout-btn:hover { border-color: #e60000; color: #e60000; }
    .admin-body { padding: 32px; max-width: 1200px; margin: 0 auto; }

    /* Stats */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: #0d0d0d; border: 1px solid rgba(255,255,255,0.07);
      padding: 20px 24px;
    }
    .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #e60000; }

    /* Table toolbar */
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .table-toolbar h2 { font-size: 1.1rem; font-weight: 600; }
    #btn-add {
      background: #e60000; color: #fff; border: none;
      padding: 11px 24px; font-weight: 700; font-size: 0.82rem;
      text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer;
    }
    #btn-add:hover { opacity: 0.85; }

    /* Table */
    .v-table { width: 100%; border-collapse: collapse; }
    .v-table th {
      text-align: left; font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.08); padding: 10px 14px;
    }
    .v-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    .v-table tr:hover td { background: rgba(255,255,255,0.02); }
    .v-table img { width: 90px; height: 60px; object-fit: cover; border-radius: 3px; display: block; }
    .v-name { font-weight: 600; font-size: 0.95rem; }
    .v-sub  { color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-top: 3px; }
    .v-price { font-weight: 700; color: #e60000; }
    .v-views { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

    /* Toggle */
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: rgba(255,255,255,0.15); border-radius: 22px; cursor: pointer; transition: .3s; }
    .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    .toggle input:checked + .slider { background: #22c55e; }
    .toggle input:checked + .slider:before { transform: translateX(18px); }

    /* Action buttons */
    .btn-edit {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; margin-right: 6px;
    }
    .btn-edit:hover { border-color: #fff; }
    .btn-delete {
      background: rgba(230,0,0,0.08); border: 1px solid rgba(230,0,0,0.2);
      color: #e60000; padding: 6px 14px; font-size: 0.8rem; cursor: pointer;
    }
    .btn-delete:hover { background: rgba(230,0,0,0.2); }

    /* ── MODAL ── */
    #form-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 200;
      align-items: flex-start; justify-content: center;
      overflow-y: auto; padding: 40px 20px;
    }
    .modal-content {
      background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1);
      width: 100%; max-width: 760px; padding: 36px;
      position: relative;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .modal-header h2 { font-size: 1.3rem; font-weight: 700; }
    #btn-close-modal {
      background: none; border: none; color: rgba(255,255,255,0.4);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    #btn-close-modal:hover { color: #fff; }

    /* Form grid */
    .form-section { margin-bottom: 28px; }
    .form-section-title {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .form-grid { display: grid; gap: 12px; }
    .form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.75rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.1em; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 11px 14px; font-size: 0.9rem; outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #e60000; }
    .form-group select { background: #111; }
    .form-group textarea { resize: vertical; min-height: 100px; }

    /* Photos */
    .photo-upload-area {
      border: 2px dashed rgba(255,255,255,0.1); padding: 20px;
      text-align: center; cursor: pointer; transition: border-color .2s;
      margin-bottom: 12px;
    }
    .photo-upload-area:hover { border-color: rgba(255,255,255,0.3); }
    .photo-upload-area input { display: none; }
    .photo-upload-area p { color: rgba(255,255,255,0.35); font-size: 0.85rem; }
    .photos-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .photo-thumb { position: relative; }
    .photo-thumb img { width: 100px; height: 70px; object-fit: cover; border-radius: 3px; display: block; }
    .photo-thumb button {
      position: absolute; top: 3px; right: 3px;
      background: #e60000; border: none; color: #fff;
      border-radius: 50%; width: 20px; height: 20px;
      cursor: pointer; font-size: 12px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }

    /* Active toggle row */
    .actif-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .actif-row label { font-size: 0.9rem; color: rgba(255,255,255,0.6); cursor: pointer; }

    /* Save button */
    #btn-save {
      width: 100%; background: #e60000; color: #fff; border: none;
      padding: 15px; font-weight: 700; font-size: 0.88rem;
      text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; margin-top: 8px;
    }
    #btn-save:hover { opacity: 0.85; }
    #btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    #save-error { color: #e60000; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-grid.cols-2, .form-grid.cols-3 { grid-template-columns: 1fr; }
      .admin-body { padding: 16px; }
      .modal-content { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN ══ -->
  <section id="login-section">
    <div class="login-box">
      <img src="/gp_motors.png" alt="GP Motors" style="mix-blend-mode:screen;" />
      <h1>Administration</h1>
      <p>Connectez-vous pour gérer les annonces.</p>
      <form id="login-form">
        <input id="login-email"    type="email"    placeholder="Adresse email"  required autocomplete="email" />
        <input id="login-password" type="password" placeholder="Mot de passe"   required autocomplete="current-password" />
        <div id="login-error"></div>
        <button type="submit">Connexion →</button>
      </form>
    </div>
  </section>

  <!-- ══ DASHBOARD ══ -->
  <section id="dashboard-section">
    <header class="admin-header">
      <img src="/gp_motors.png" alt="GP Motors" style="mix-blend-mode:screen;" />
      <span>Administration</span>
      <button id="logout-btn">Déconnexion</button>
    </header>

    <div class="admin-body">

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="label">Annonces actives</div>
          <div class="value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Total des vues</div>
          <div class="value" id="stat-vues">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Annonces publiées</div>
          <div class="value" id="stat-actif">0</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-toolbar">
        <h2>Annonces</h2>
        <button id="btn-add">+ Nouvelle annonce</button>
      </div>

      <div style="overflow-x:auto;">
        <table class="v-table">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Véhicule</th>
              <th>Prix</th>
              <th>Vues</th>
              <th>Visible</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="vehicles-tbody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">Chargement…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </section>

  <!-- ══ MODAL FORM ══ -->
  <div id="form-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="form-title">Nouvelle annonce</h2>
        <button id="btn-close-modal">✕</button>
      </div>

      <form id="vehicle-form" autocomplete="off">

        <!-- Infos principales -->
        <div class="form-section">
          <div class="form-section-title">Informations principales</div>
          <div class="form-grid cols-2">
            <div class="form-group"><label>Marque *</label><input id="f-marque" type="text" placeholder="Ex : Porsche" required /></div>
            <div class="form-group"><label>Modèle *</label><input id="f-modele" type="text" placeholder="Ex : 911 Carrera" required /></div>
            <div class="form-group"><label>Année *</label><input id="f-annee" type="number" min="1950" max="2030" placeholder="2022" required /></div>
            <div class="form-group"><label>Prix (€) *</label><input id="f-prix" type="number" min="0" placeholder="89900" required /></div>
            <div class="form-group"><label>Kilométrage *</label><input id="f-kilometrage" type="number" min="0" placeholder="32000" required /></div>
            <div class="form-group"><label>Énergie *</label>
              <select id="f-energie" required>
                <option value="">— Choisir —</option>
                <option>Essence</option><option>Diesel</option>
                <option>Hybride</option><option>Électrique</option>
              </select>
            </div>
            <div class="form-group"><label>Boîte de vitesse *</label>
              <select id="f-boite" required>
                <option value="">— Choisir —</option>
                <option>Automatique</option><option>Manuelle</option>
              </select>
            </div>
            <div class="form-group"><label>Type de véhicule</label>
              <select id="f-type_vehicule">
                <option value="">— Choisir —</option>
                <option>Berline</option><option>SUV</option><option>Coupé</option>
                <option>Cabriolet</option><option>Break</option><option>Monospace</option>
                <option>Citadine</option><option>Sportive</option><option>Utilitaire</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Détails techniques -->
        <div class="form-section">
          <div class="form-section-title">Détails techniques</div>
          <div class="form-grid cols-3">
            <div class="form-group"><label>Nb. portes</label><input id="f-nb_portes" type="number" min="1" max="10" placeholder="5" /></div>
            <div class="form-group"><label>Nb. places</label><input id="f-nb_places" type="number" min="1" max="20" placeholder="5" /></div>
            <div class="form-group"><label>Date 1ère immat.</label><input id="f-date_mec" type="text" placeholder="03/2022" /></div>
            <div class="form-group"><label>Couleur</label><input id="f-couleur" type="text" placeholder="Blanc Nacré" /></div>
            <div class="form-group"><label>Puissance fiscale (Cv)</label><input id="f-puissance_fiscale" type="number" min="1" placeholder="12" /></div>
            <div class="form-group"><label>Puissance DIN (Ch)</label><input id="f-puissance_din" type="number" min="1" placeholder="450" /></div>
            <div class="form-group"><label>Permis</label>
              <select id="f-permis">
                <option value="true">Avec permis</option>
                <option value="false">Sans permis</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="form-section">
          <div class="form-section-title">Description</div>
          <div class="form-group">
            <textarea id="f-description" placeholder="Décrivez le véhicule, ses options, son historique…" rows="5"></textarea>
          </div>
        </div>

        <!-- Photos -->
        <div class="form-section">
          <div class="form-section-title">Photos</div>
          <div class="photos-grid" id="existing-photos"></div>
          <label class="photo-upload-area" id="photo-drop">
            <input type="file" id="f-photos" multiple accept="image/jpeg,image/png,image/webp" />
            <p>Cliquez ou déposez vos photos ici<br><span style="font-size:0.75rem;opacity:0.5;">JPG, PNG, WEBP — max 5 Mo / photo</span></p>
          </label>
          <div class="photos-grid" id="new-photos-preview"></div>
        </div>

        <!-- Catégorie -->
        <div class="form-section">
          <div class="form-section-title">Catégorie</div>
          <div class="form-grid cols-2">
            <div class="form-group"><label>Type d'annonce *</label>
              <select id="f-categorie" onchange="toggleLocationFields()">
                <option value="vente">Vente</option>
                <option value="location">Location</option>
              </select>
            </div>
            <div class="form-group" id="prix-jour-group" style="display:none;">
              <label>Prix / jour (€)</label>
              <input id="f-prix_jour" type="number" min="0" placeholder="Ex : 80" />
            </div>
          </div>
          <div class="form-grid cols-2" id="indispo-group" style="display:none;margin-top:12px;">
            <div class="form-group">
              <label>Indisponible du</label>
              <input id="f-indispo_debut" type="date" />
            </div>
            <div class="form-group">
              <label>Indisponible jusqu'au</label>
              <input id="f-indispo_fin" type="date" />
            </div>
          </div>
        </div>

        <!-- Visibilité -->
        <div class="form-section">
          <div class="form-section-title">Visibilité</div>
          <div class="actif-row">
            <label class="toggle">
              <input type="checkbox" id="f-actif" checked />
              <span class="slider"></span>
            </label>
            <label for="f-actif">Annonce visible sur le site</label>
          </div>
        </div>

        <div id="save-error"></div>
        <button type="submit" id="btn-save">Enregistrer l'annonce →</button>

      </form>
    </div>
  </div>

  <script>
    function toggleLocationFields() {
      const cat = document.getElementById('f-categorie').value;
      const isLoc = cat === 'location';
      document.getElementById('prix-jour-group').style.display  = isLoc ? 'block' : 'none';
      document.getElementById('indispo-group').style.display    = isLoc ? 'grid'  : 'none';
    }
  </script>
  <script type="module" src="/src/admin.js"></script>
</body>
</html>
